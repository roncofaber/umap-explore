# fly.toml app configuration file generated for umap-explore on 2026-07-13T14:44:56-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'umap-explore'
primary_region = 'sjc'

[build]
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[mounts]]
  source = "embeddings"
  destination = "/app/data/embeddings"

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
